# Docker Compose stack for SABD Project 1
#
#   Services:
#     - namenode      HDFS master         (UI :9870, RPC :9000)
#     - datanode      HDFS worker         (UI :9864)
#     - spark-master  Spark coordinator   (UI :8080, RPC :7077)
#     - spark-worker  Spark executor      (UI :8081)
#
# The project root is mounted into the Spark containers at /app, so
# spark-submit can run `/app/src/query1.py` directly.

services:

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: sabd_namenode
    hostname: namenode
    restart: unless-stopped
    ports:
      - "9870:9870"   # NameNode web UI
      - "9000:9000"   # HDFS RPC
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=sabd-cluster
    env_file:
      - ./hadoop.env
    networks:
      - sabd_net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: sabd_datanode
    hostname: datanode
    restart: unless-stopped
    depends_on:
      - namenode
    ports:
      - "9864:9864"   # DataNode web UI
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "namenode:9000"
    env_file:
      - ./hadoop.env
    networks:
      - sabd_net

  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: sabd_spark_master
    hostname: spark-master
    restart: unless-stopped
    depends_on:
      - namenode
      - datanode
    ports:
      - "8080:8080"   # Spark master web UI
      - "7077:7077"   # Spark master RPC
    environment:
      - INIT_DAEMON_STEP=setup_spark
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - ..:/app
    networks:
      - sabd_net

  spark-worker:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: sabd_spark_worker
    hostname: spark-worker
    restart: unless-stopped
    depends_on:
      - spark-master
    ports:
      - "8081:8081"   # Spark worker web UI
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - ..:/app
    networks:
      - sabd_net

volumes:
  hadoop_namenode:
  hadoop_datanode:

networks:
  sabd_net:
    driver: bridge
